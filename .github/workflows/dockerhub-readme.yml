name: dockerhub-readme

on:
  push:
    branches:
      - main
    paths:
      - README.docker.md
      - .github/workflows/dockerhub-readme.yml

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Push README to Docker Hub
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          repository: jasona1246/nws_exporter-with-noaa-water-gauge-support
          readme-filepath: ./README.docker.md
          short-description: Prometheus metrics exporter for api.weather.gov weather stations, NOAA water gauges, and NOAA buoys
